name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    # only the stats repository integration test touches this -- everything else in the
    # suite still runs against the in-memory repositories with no db needed
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: unblur_user_service
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm run build
      - run: npm test
        env:
          INTEGRATION_DB_HOST: localhost
          INTEGRATION_DB_PORT: 5432
          INTEGRATION_DB_NAME: unblur_user_service
          INTEGRATION_DB_USER: postgres
          INTEGRATION_DB_PASSWORD: postgres
